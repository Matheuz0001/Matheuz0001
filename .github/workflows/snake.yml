# 🐍 Snake animation - gera a cobrinha das contribuições automaticamente

name: Generate Snake Animation

on:
  schedule:
    # Roda automaticamente todos os dias às 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Gera o SVG da snake no tema escuro
      - name: Generate Snake (Dark)
        uses: Platane/snk@v3
        with:
          github_user_name: Matheuz0001
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publica o SVG gerado na branch "output"
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
