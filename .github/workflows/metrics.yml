name: Generate Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Calendário isométrico 3D
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics-isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_timezone: America/Sao_Paulo

      # Linguagens em detalhes
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics-languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_layout: compact
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          config_timezone: America/Sao_Paulo

      # Hábitos de código
      - name: Habits
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics-habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_from: 200
          config_timezone: America/Sao_Paulo

      # Achievements
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics-achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          config_timezone: America/Sao_Paulo
